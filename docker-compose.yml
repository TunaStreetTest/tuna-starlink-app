# Beelink-friendly single-node run. No Kafka, no cluster.
# Usage:
#   cp backend/.env.example .env   # then set XAI_API_KEY
#   docker compose up --build

services:
  app:
    build: .
    image: tuna-starlink-app:latest
    ports:
      - "8091:8000"
    env_file:
      - path: .env
        required: false
    environment:
      ART_STORAGE_PATH: /art
      DRY_RUN: ${DRY_RUN:-false}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XAI_CHAT_MODEL: ${XAI_CHAT_MODEL:-grok-4-1-fast-reasoning}
      XAI_IMAGE_MODEL: ${XAI_IMAGE_MODEL:-grok-imagine-image}
      DEFAULT_STYLE: ${DEFAULT_STYLE:-picasso-pixel}
      EDGE_TEXT: ${EDGE_TEXT:-xai}
      LEMONADE_URL: ${LEMONADE_URL:-http://host.docker.internal:13305}
      SCHEDULE_ENABLED: ${SCHEDULE_ENABLED:-false}
      SCHEDULE_CRON: ${SCHEDULE_CRON:-}
    volumes:
      - ./art:/art
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
