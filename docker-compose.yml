# Beelink / laptop single-node run.
# Usage:
#   copy backend/.env.example to .env and fill keys
#   docker compose up --build

services:
  app:
    build: .
    image: tuna-starlink-app:latest
    ports:
      - "8091:8000"
    env_file:
      - path: .env
        required: false
    environment:
      ART_STORAGE_PATH: /art
      DRY_RUN: ${DRY_RUN:-false}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XAI_CHAT_MODEL: ${XAI_CHAT_MODEL:-grok-4-1-fast-non-reasoning}
      XAI_IMAGE_MODEL: ${XAI_IMAGE_MODEL:-grok-imagine-image}
      XAI_IMAGE_SIZE: ${XAI_IMAGE_SIZE:-1792x1024}
      XAI_IMAGE_ASPECT_RATIO: ${XAI_IMAGE_ASPECT_RATIO:-16:9}
      DEFAULT_STYLE: ${DEFAULT_STYLE:-data-tunnel}
      EVENTS_SOURCE: ${EVENTS_SOURCE:-stream}
      RSS_INGEST_TTL_MINUTES: ${RSS_INGEST_TTL_MINUTES:-45}
      X_SEARCH_ENABLED: ${X_SEARCH_ENABLED:-false}
      X_SEARCH_TTL_MINUTES: ${X_SEARCH_TTL_MINUTES:-120}
      X_SEARCH_MAX_RESULTS: ${X_SEARCH_MAX_RESULTS:-10}
      EDGE_TEXT: ${EDGE_TEXT:-xai}
      LEMONADE_URL: ${LEMONADE_URL:-http://host.docker.internal:13305}
      SCHEDULE_ENABLED: ${SCHEDULE_ENABLED:-false}
      SCHEDULE_CRON: ${SCHEDULE_CRON:-off (manual posts only)}
      SCHEDULE_TIMEZONE: ${SCHEDULE_TIMEZONE:-America/New_York}
      SCHEDULE_INTERVAL_MINUTES: ${SCHEDULE_INTERVAL_MINUTES:-40}
      SCHEDULE_PEAK_START_HOUR: ${SCHEDULE_PEAK_START_HOUR:-19}
      SCHEDULE_PEAK_END_HOUR: ${SCHEDULE_PEAK_END_HOUR:-22}
      SCHEDULE_MAX_RUNS_PER_DAY: ${SCHEDULE_MAX_RUNS_PER_DAY:-5}
      AUTO_PUBLISH: ${AUTO_PUBLISH:-false}
      X_API_KEY: ${X_API_KEY:-}
      X_API_SECRET: ${X_API_SECRET:-}
      X_ACCESS_TOKEN: ${X_ACCESS_TOKEN:-}
      X_ACCESS_TOKEN_SECRET: ${X_ACCESS_TOKEN_SECRET:-}
      X_ACCOUNT_HANDLE: ${X_ACCOUNT_HANDLE:-@tunastarlink}
    volumes:
      - ./art:/art
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
