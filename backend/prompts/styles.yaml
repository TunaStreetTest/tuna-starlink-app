# Planet Hack — digital series for @tunastarlink
# Session 2: distinct styles, less AI-extra, each paired with a news lane.
# Share / add styles: see docs/STYLE-SEEDS.md

series:
  name: Planet Hack
  tagline: One story from the wire, remixed as 3D digital art.
  # Keep SHORT — only franchise constants. Per-style seeds own the look.
  shared_lock: >
    HARD RULES: 3D digital CGI only. Wide 16:9 landscape full-bleed frame.
    One clear hero plus supporting atmosphere — interesting, not empty, not a scrapyard.
    No readable text, logos, flags, photoreal people, or real city maps.
    NOT oil paint. NOT a corporate tech banner.

default: data-tunnel

styles:
  planet-core:
    label: Planet Core
    hashtag: PlanetCore
    lane: geopolitics
    description: Quiet core — cracked data-Earth, one root spike, dark void.
    art_director_notes: >
      Geopolitics / global-order story as metaphor only. One hero: a partial data-Earth
      and a single root node. Sparse rings, little debris. Mood: gravity and pressure,
      not a fireworks show. Palette dominated by deep void + cool cyan, one gold limb.
    prompt_seed: >
      Wide 16:9 landscape, planetary computer core, cracked wireframe Earth as hero,
      glowing root spike, a few broken orbital rings, cool cyan and soft gold on deep void,
      atmospheric depth, calm powerful still, full-bleed horizontal

  data-tunnel:
    label: Data Tunnel
    hashtag: DataTunnel
    lane: tech
    description: Speed tunnel — vanishing-point conduit with clear energy.
    art_director_notes: >
      Tech / AI / infrastructure story as metaphor. Strong tunnel axis, motion, far glow.
      Geometric walls with energy — kinetic but readable, not scrapyard junk.
      Palette: cyan dominant, magenta accents, black.
    prompt_seed: >
      Wide 16:9 landscape, high-speed cyberspace tunnel, strong vanishing point,
      luminous geometric conduit walls, motion streaks, far root-light, cyan and magenta,
      kinetic depth, extreme FOV, full-bleed horizontal

  signal-cathedral:
    label: Signal Cathedral
    hashtag: SignalCathedral
    lane: science
    description: Beams and dish geometry — airy megastructure with presence.
    art_director_notes: >
      Science / space / climate / energy story as metaphor. Wide cathedral interior:
      soaring beams, dish forms, volumetric light, room to breathe but not empty.
      Vertical architecture in a horizontal frame. Palette: void + cyan + soft gold.
    prompt_seed: >
      Wide 16:9 landscape, digital signal cathedral, soaring neon beams and parabolic dishes,
      volumetric cyan-gold light, deep dark volumes, epic open composition, full-bleed horizontal

  rootkit-city:
    label: Rootkit City
    hashtag: RootkitCity
    lane: markets
    description: Circuit skyline with a clear infiltration path.
    art_director_notes: >
      Markets / power / civic story as metaphor. Circuit tower city with ONE bright
      rewrite path. Clear skyline, layered depth, intentional detail without noise soup.
      Palette: acid-green infiltration on dark cyan grid.
    prompt_seed: >
      Wide 16:9 landscape, circuit-board metropolis skyline, clear tower silhouettes,
      bright acid-green infiltration path, dark cyan grid, layered night digital city,
      readable cinematic composition, full-bleed horizontal
