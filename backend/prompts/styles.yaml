# Planet Hack — digital series for @tunastarlink
# Session 2: distinct styles, less AI-extra, each paired with a news lane.
# Share / add styles: see docs/STYLE-SEEDS.md

series:
  name: Planet Hack
  tagline: One story from the wire, remixed as 3D digital art.
  # Keep SHORT — only franchise constants. Per-style seeds own the look.
  shared_lock: >
    HARD RULES: 3D digital CGI only. Wide 16:9 landscape full-bleed frame.
    One clear hero subject, real negative space (do not fill every corner).
    No readable text, logos, flags, photoreal people, or real city maps.
    NOT oil paint. NOT a corporate tech banner. NOT the same neon scrapyard every time.

default: data-tunnel

styles:
  planet-core:
    label: Planet Core
    hashtag: PlanetCore
    lane: geopolitics
    description: Quiet core — cracked data-Earth, one root spike, dark void.
    art_director_notes: >
      Geopolitics / global-order story as metaphor only. One hero: a partial data-Earth
      and a single root node. Sparse rings, little debris. Mood: gravity and pressure,
      not a fireworks show. Palette dominated by deep void + cool cyan, one gold limb.
    prompt_seed: >
      Wide 16:9 landscape, sparse planetary computer core, single cracked wireframe Earth,
      one glowing root spike, thin broken ring, vast black void, cool cyan and soft gold only,
      minimal debris, calm powerful still, full-bleed horizontal

  data-tunnel:
    label: Data Tunnel
    hashtag: DataTunnel
    lane: tech
    description: Speed tunnel — one vanishing-point conduit (kinetic, not scrapyard).
    art_director_notes: >
      Tech / AI / infrastructure story as metaphor. One tunnel axis, motion streaks,
      far terminus glow. Keep walls clean-ish geometric; avoid filling the frame with junk.
      Palette: cyan dominant, magenta accents, black.
    prompt_seed: >
      Wide 16:9 landscape, high-speed cyberspace tunnel, single vanishing point,
      luminous conduit walls, motion streaks, far root-light, cyan with magenta accents,
      moderate particles only, extreme FOV, full-bleed horizontal

  signal-cathedral:
    label: Signal Cathedral
    hashtag: SignalCathedral
    lane: science
    description: Tall beams and dish geometry — airy megastructure, not clutter.
    art_director_notes: >
      Science / space / climate / energy story as metaphor. Wide shot of airy digital
      cathedral: few soaring beams, pure dish forms, lots of dark air. Vertical architecture
      in a horizontal frame. Palette: void + cyan + soft gold, less magenta.
    prompt_seed: >
      Wide 16:9 landscape, airy digital signal cathedral, few soaring neon beams,
      pure parabolic dish silhouettes, large dark volumes of space, cyan and gold light,
      minimal particle clutter, epic but open composition, full-bleed horizontal

  rootkit-city:
    label: Rootkit City
    hashtag: RootkitCity
    lane: markets
    description: Circuit skyline with one infiltration path — readable silhouette.
    art_director_notes: >
      Markets / power / civic story as metaphor. City of circuit towers with ONE bright
      rewrite path cutting through. Clear skyline silhouette, not a wall of noise.
      Palette: acid-green infiltration on dark cyan grid.
    prompt_seed: >
      Wide 16:9 landscape, circuit-board metropolis skyline, clear tower silhouettes,
      one bright acid-green infiltration path, dark cyan grid ground, sparse floating blocks,
      readable composition, night digital, full-bleed horizontal
